name: poll-vendas
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: poll
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node poller.mjs
        env:
          REDTRACK_API_KEY: ${{ secrets.REDTRACK_API_KEY }}
      - name: commit state
        run: |
          git config user.name "poller-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/seen.json
          git diff --cached --quiet || (git commit -m "state" && git pull --rebase && git push)
