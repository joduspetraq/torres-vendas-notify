name: poll-vendas
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: poll
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: loop de polling (1x por minuto, ~5h45 por job)
        env:
          REDTRACK_API_KEY: ${{ secrets.REDTRACK_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          git config user.name "poller-bot"
          git config user.email "bot@users.noreply.github.com"
          for i in $(seq 1 340); do
            node poller.mjs || true
            if ! git diff --quiet state/seen.json; then
              git add state/seen.json
              git commit -qm "state"
              git pull -q --rebase || true
              git push -q || true
            fi
            sleep 55
          done
